# Single-Agent Benchmark Configuration
# Model: GPT-OSS-120b (unsloth) via vLLM
# Dataset: SWE-Bench Pro (Verified)
#
# Usage:
#   python scripts/run_single_agent_bench.py configs/single_agent_gpt_oss_120b.yaml
#   OR
#   agent-cap single-agent configs/single_agent_gpt_oss_120b.yaml

name: single-agent-gpt-oss-120b-swebench
model_id: unsloth/GPT-OSS-120b
serving_engine: vllm
base_url: http://localhost:30000

# Dataset
dataset: swebench_pro
dataset_count: 50

# Batch-size sweep: test how E2E latency changes with concurrency
batch_sizes: [1, 2, 4, 8, 16, 32]

# Tool-call testing
enable_tool_calls: true
# tool_definitions: null  # uses DEFAULT_TOOL_DEFINITIONS from tool_simulator.py

# Generation parameters
max_tokens: 4096
temperature: 0.0
repetitions: 1

# Hardware monitoring
gpu_monitor_interval: 0.5
cpu_monitor_interval: 0.5

# Server config (if auto-launching)
tp: 8
gpu_type: H100-80G
python_path: python
cuda_visible_devices: ""

# Output
output_dir: results/single_agent
